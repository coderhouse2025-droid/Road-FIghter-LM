<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Matanza Road Fighter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;}
#wrap{position:fixed;inset:0;background:#000;overflow:hidden;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;position:absolute;}
#ui{position:absolute;pointer-events:none;font-family:'Share Tech Mono',monospace;}
#hud-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:4px;gap:3px;}
.hp{background:rgba(0,0,0,.82);border:1px solid #ff006688;padding:2px 4px;text-align:center;flex:1;min-width:0;}
.hpt{color:#ff0066;font-size:6px;letter-spacing:1px;text-transform:uppercase;}
.hpv{font-size:13px;font-weight:bold;color:#fff;line-height:1.1;}
#hud-bot{position:absolute;bottom:0;left:0;right:0;padding:3px 4px;display:flex;flex-direction:column;gap:2px;}
.brow{background:rgba(0,0,0,.82);border:1px solid #333;padding:2px 4px;}
.blbl{color:#ff0066;font-size:6px;letter-spacing:1px;display:flex;justify-content:space-between;margin-bottom:1px;}
.btrk{height:6px;background:#222;border:1px solid #333;}
.bfil{height:100%;transition:width .12s;}
/* Lives dots */
#lives-row{display:flex;gap:4px;justify-content:center;padding:2px 0;}
.life-dot{width:8px;height:8px;border-radius:50%;background:#ff0066;box-shadow:0 0 4px #ff0066;}
.life-dot.lost{background:#333;box-shadow:none;}
/* Overlay */
#overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8%;z-index:20;text-align:center;font-family:'Share Tech Mono',monospace;}
#ov-bg{position:absolute;inset:0;background-size:cover;background-position:center top;opacity:0;transition:opacity .5s;}
#ov-bg.on{opacity:1;}
#ov-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05) 0%,rgba(0,0,0,.0) 35%,rgba(0,0,0,.7) 62%,rgba(0,0,0,.94) 100%);}
#ov-cnt{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0 10px;}
.ov1{font-family:'Boogaloo',cursive;font-size:clamp(18px,5vw,32px);color:#ff0066;text-shadow:0 0 16px #ff0066,2px 2px 0 #000;letter-spacing:2px;line-height:1.1;}
.ov2{font-size:clamp(7px,1.9vw,11px);color:#ffdd00;letter-spacing:3px;}
.ovp{font-size:clamp(6px,1.7vw,10px);color:#ccc;line-height:1.85;}
.ovw{color:#ff6600;font-size:clamp(6px,1.6vw,9px);}
.ovs{font-size:clamp(18px,4.5vw,28px);color:#00ff88;text-shadow:0 0 12px #00ff88;}
.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.badge{background:rgba(0,0,0,.6);border:1px solid #ff006666;color:#ff88aa;font-size:clamp(5px,1.3vw,8px);padding:2px 5px;}
.sbtn{margin-top:10px;padding:clamp(6px,1.6vw,10px) clamp(14px,3.5vw,26px);background:#ff0066;color:#fff;border:none;font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.3vw,13px);letter-spacing:3px;cursor:pointer;text-transform:uppercase;animation:blink .85s infinite;box-shadow:0 0 14px #ff006688;pointer-events:all;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.sbtn:hover,.sbtn:active{background:#ff3388;animation:none;}
/* Level badge */
#lvl-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;text-align:center;pointer-events:none;display:none;}
#lvl-badge-inner{font-family:'Boogaloo',cursive;color:#ffdd00;text-shadow:0 0 20px #ffaa00,2px 2px 0 #000;animation:badgePop .4s ease-out;}
@keyframes badgePop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
/* Mobile controls */
#mctrl{position:fixed;bottom:0;left:0;right:0;height:82px;display:none;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(0,0,0,.7);z-index:25;}
.mbtn{width:78px;height:62px;background:rgba(255,0,102,.2);border:2px solid #ff0066;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;}
.mbtn:active{background:rgba(255,0,102,.5);}
@media(pointer:coarse){#mctrl{display:flex;}}
/* Cumbia music note flash */
#note-flash{position:absolute;top:20%;left:50%;transform:translateX(-50%);font-size:20px;opacity:0;pointer-events:none;z-index:16;transition:opacity .2s;}
</style>
</head>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// GLOBAL INPUT  – registered ONCE, never re-registered
// ═══════════════════════════════════════════════════════════
const KEYS = {};
window.addEventListener('keydown', e => {
  KEYS[e.key] = true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
}, {passive:false});
window.addEventListener('keyup', e => { KEYS[e.key] = false; });

// Mobile touch – registered once
document.getElementById('btnL').addEventListener('touchstart', e=>{e.preventDefault();KEYS['left']=true;},{passive:false});
document.getElementById('btnL').addEventListener('touchend',   e=>{e.preventDefault();KEYS['left']=false;},{passive:false});
document.getElementById('btnL').addEventListener('touchcancel',e=>{KEYS['left']=false;});
document.getElementById('btnR').addEventListener('touchstart', e=>{e.preventDefault();KEYS['right']=true;},{passive:false});
document.getElementById('btnR').addEventListener('touchend',   e=>{e.preventDefault();KEYS['right']=false;},{passive:false});
document.getElementById('btnR').addEventListener('touchcancel',e=>{KEYS['right']=false;});

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let AC=null, engOsc1=null, engOsc2=null, engLfo=null, engGain=null, engOn=false;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function startEngine(){
  if(engOn)return;
  const ac=getAC();
  engGain=ac.createGain();engGain.gain.value=.14;engGain.connect(ac.destination);
  engOsc1=ac.createOscillator();engOsc1.type='sawtooth';engOsc1.frequency.value=55;
  engOsc2=ac.createOscillator();engOsc2.type='square';engOsc2.frequency.value=112;
  engLfo=ac.createOscillator();engLfo.frequency.value=6;
  const lg=ac.createGain();lg.gain.value=8;engLfo.connect(lg);lg.connect(engOsc1.frequency);
  const ws=ac.createWaveShaper();
  const cv=new Float32Array(256);
  for(let i=0;i<256;i++){const x=(i*2)/256-1;cv[i]=(Math.PI+180)*x/(Math.PI+180*Math.abs(x));}
  ws.curve=cv;
  const mx=ac.createGain();mx.gain.value=.5;
  engOsc1.connect(ws);engOsc2.connect(mx);ws.connect(mx);mx.connect(engGain);
  engOsc1.start();engOsc2.start();engLfo.start();engOn=true;
}
function stopEngine(){
  if(!engOn)return;
  try{engOsc1.stop();engOsc2.stop();engLfo.stop();}catch(e){}
  engOn=false;
}
function setEngineSpeed(ratio){
  if(!engOn)return;const ac=getAC();const r=Math.max(.08,ratio);
  engOsc1.frequency.setTargetAtTime(44+r*155,ac.currentTime,.09);
  engOsc2.frequency.setTargetAtTime((44+r*155)*2.1,ac.currentTime,.09);
  engGain.gain.setTargetAtTime(.09+r*.12,ac.currentTime,.05);
}
function sndSkid(){
  const ac=getAC();
  const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.55),ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.75;
  const src=ac.createBufferSource();src.buffer=buf;
  const bpf=ac.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=1700;bpf.Q.value=.9;
  const g=ac.createGain();g.gain.setValueAtTime(.55,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+.55);
  src.connect(bpf);bpf.connect(g);g.connect(ac.destination);src.start();
}
function sndBump(){
  const ac=getAC();const o=ac.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(125,ac.currentTime);o.frequency.exponentialRampToValueAtTime(36,ac.currentTime+.18);
  const g=ac.createGain();g.gain.setValueAtTime(.55,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.22);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.24);
}
function sndCrash(){
  const ac=getAC();const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.6),ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const src=ac.createBufferSource();src.buffer=buf;
  const lpf=ac.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=900;
  const g=ac.createGain();g.gain.setValueAtTime(.8,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.6);
  src.connect(lpf);lpf.connect(g);g.connect(ac.destination);src.start();
}
function sndFuel(){
  const ac=getAC();[0,.1,.2].forEach((t,i)=>{
    const o=ac.createOscillator();o.type='sine';o.frequency.value=440+i*200;
    const g=ac.createGain();g.gain.setValueAtTime(0,ac.currentTime+t);g.gain.linearRampToValueAtTime(.3,ac.currentTime+t+.04);g.gain.linearRampToValueAtTime(0,ac.currentTime+t+.14);
    o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.18);
  });
}
// Cumbia-style beat (simple rhythm)
let cumbiaInterval=null;
function startCumbia(){
  if(cumbiaInterval)return;
  const pattern=[200,0,180,0,160,0,180,0]; // bass, kick alternating
  let step=0;
  cumbiaInterval=setInterval(()=>{
    const ac=getAC();
    if(!engOn){clearInterval(cumbiaInterval);cumbiaInterval=null;return;}
    const v=pattern[step%pattern.length];
    if(v>0){
      const o=ac.createOscillator();o.type='triangle';
      o.frequency.setValueAtTime(v,ac.currentTime);o.frequency.exponentialRampToValueAtTime(v*.5,ac.currentTime+.12);
      const g=ac.createGain();g.gain.setValueAtTime(.07,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.14);
      o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.16);
      // Flash music note occasionally
      if(Math.random()<.25){const nf=document.getElementById('note-flash');nf.style.opacity='.8';setTimeout(()=>nf.style.opacity='0',150);}
    }
    step++;
  },200);
}
function stopCumbia(){if(cumbiaInterval){clearInterval(cumbiaInterval);cumbiaInterval=null;}}

// ═══════════════════════════════════════════════════════════
// CANVAS / RESIZE
// ═══════════════════════════════════════════════════════════
const CW=280,CH=480;
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let cL=0,cT=0,cDW=CW,cDH=CH;

function resize(){
  const mob=window.matchMedia('(pointer:coarse)').matches;
  const avH=mob?window.innerHeight-82:window.innerHeight;
  const avW=window.innerWidth;
  const sc=Math.min(avH/CH,avW/CW);
  cDW=Math.floor(CW*sc);cDH=Math.floor(CH*sc);
  cL=Math.floor((avW-cDW)/2);cT=Math.floor((avH-cDH)/2);
  canvas.width=CW;canvas.height=CH;
  canvas.style.cssText=`width:${cDW}px;height:${cDH}px;left:${cL}px;top:${cT}px;`;
  const ui=document.getElementById('ui');
  ui.style.cssText=`width:${cDW}px;height:${cDH}px;left:${cL}px;top:${cT}px;`;
  const ov=document.getElementById('overlay');
  ov.style.cssText=`width:${cDW}px;height:${cDH}px;left:${cL}px;top:${cT}px;display:${ov.style.display||'none'};flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8%;z-index:20;text-align:center;`;
  const lb=document.getElementById('lvl-badge');
  lb.style.cssText=`width:${cDW}px;height:${cDH}px;left:${cL}px;top:${cT}px;position:absolute;z-index:15;display:flex;align-items:center;justify-content:center;pointer-events:none;display:${lb.style.display||'none'};`;
}
window.addEventListener('resize',resize);

// ═══════════════════════════════════════════════════════════
// LEVEL CONFIGS  (from document)
// ═══════════════════════════════════════════════════════════
const LEVEL_CFG=[
  { // 1 – Ramos Mejía
    name:'RAMOS MEJÍA', color:'#88ccff', bgRoad:'#2a2a38', bgSide:'#3a4a3a',

  },
  { // 2 – San Justo
    name:'SAN JUSTO', color:'#ffdd44', bgRoad:'#252530', bgSide:'#2a3a2a',

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const RL=40,RR=240,RW=RR-RL,LC=3,LW=RW/LC;
const LANES=[RL+LW*.5,RL+LW*1.5,RL+LW*2.5];
const BUS_LINES=[88,96,174,180,378,620,621,630];
const MAX_LIVES=3;

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function dk(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.floor(r*.55)},${Math.floor(g*.55)},${Math.floor(b*.55)})`;}
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function rnd(a,b){return a+Math.random()*(b-a);}

// ═══════════════════════════════════════════════════════════
// DRAW HELPERS
// ═══════════════════════════════════════════════════════════
function drawCar(x,y,color,w,h){
  const dk2=dk(color);
  px(x+Math.floor(w*.2),y,        Math.floor(w*.6),Math.floor(h*.15),color);
  px(x,                y+Math.floor(h*.12),w,Math.floor(h*.65),color);
  px(x+Math.floor(w*.15),y+Math.floor(h*.14),Math.floor(w*.7),Math.floor(h*.28),'#b8e4ff');
  px(x+Math.floor(w*.1),y+Math.floor(h*.72),Math.floor(w*.8),Math.floor(h*.22),dk2);
  // wheels
  px(x-1,y+Math.floor(h*.18),3,Math.floor(h*.22),'#111');
  px(x+w-2,y+Math.floor(h*.18),3,Math.floor(h*.22),'#111');
  px(x-1,y+Math.floor(h*.62),3,Math.floor(h*.22),'#111');
  px(x+w-2,y+Math.floor(h*.62),3,Math.floor(h*.22),'#111');
  // headlights
  px(x+Math.floor(w*.15),y,2,2,'#ffff88');
  px(x+Math.floor(w*.65),y,2,2,'#ffff88');
}
function drawTaxi(x,y){
  drawCar(x,y,'#ffcc00',14,22);
  ctx.fillStyle='#000';ctx.font='5px monospace';ctx.textAlign='center';
  ctx.fillText('TAXI',x+7,y+14);
}
function drawMoto(x,y){
  px(x+2,y+2, 8,14,'#cc4400');px(x+3,y,   6, 4,'#aaa');
  px(x+1,y+4, 4, 8,'#222');px(x+7,y+4, 4, 8,'#222');
  px(x+4,y+5, 4, 5,'#ff6600'); // rider
  px(x+3,y+2, 6, 4,'#333'); // helmet
}
function drawBike(x,y){
  px(x+2,y+2,8,12,'#228833');px(x+3,y+1,6,3,'#888');
  px(x+1,y+4,3,7,'#111');px(x+8,y+4,3,7,'#111');
  px(x+4,y+4,4,5,'#ffcc88'); // rider
}
function drawBus(x,y,lineNum){
  const c='#1a44bb',h=50,w=22;
  px(x,y,w,h,c);
  for(let i=0;i<4;i++){px(x+2,y+16+i*9,7,6,'#aaddff');px(x+13,y+16+i*9,7,6,'#aaddff');}
  // Roof with line number
  px(x,y,w,13,'#ffdd00');
  px(x+1,y+1,w-2,11,'#111');
  ctx.save();ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(String(lineNum),x+w/2,y+7);ctx.restore();
  // wheels
  px(x-2,y+8,4,7,'#111');px(x+w-2,y+8,4,7,'#111');
  px(x-2,y+h-15,4,7,'#111');px(x+w-2,y+h-15,4,7,'#111');
  px(x+2,y+h-6,w-4,5,dk(c));
}
function drawTruck(x,y){
  px(x,y,18,38,'#558855');px(x+1,y+1,16,10,'#446644');
  px(x+2,y+2,14,7,'#88aaff');
  px(x-2,y+6,4,8,'#111');px(x+16,y+6,4,8,'#111');
  px(x-2,y+28,4,8,'#111');px(x+16,y+28,4,8,'#111');
}
function drawCamion(x,y){
  px(x,y,20,56,'#884422');px(x+1,y+1,18,14,'#664422');
  px(x+2,y+2,16,10,'#99ccff');
  px(x-2,y+8,4,9,'#111');px(x+18,y+8,4,9,'#111');
  px(x-2,y+20,4,9,'#111');px(x+18,y+20,4,9,'#111');
  px(x-2,y+42,4,9,'#111');px(x+18,y+42,4,9,'#111');
}
function drawPolice(x,y){
  drawCar(x,y,'#2244aa',14,22);
  px(x+3,y-2,8,3,'#ff0000');px(x+3,y-2,4,3,'#ff0000');px(x+7,y-2,4,3,'#0000ff');
}
function drawPedestrian(x,y){
  px(x+3,y,4,4,'#ffcc88');px(x+2,y+4,6,8,`hsl(${Math.floor(rnd(0,360))},50%,45%)`);
  px(x+1,y+12,3,6,'#334');px(x+6,y+12,3,6,'#334');
}
function drawGasStation(x,y,brand){
  px(x,y+8,18,20,'#eee');
  ctx.fillStyle=brand==='YPF'?'#0066cc':'#ff6600';
  ctx.fillRect(x,y,18,10);
  ctx.fillStyle='#fff';ctx.font='bold 6px monospace';ctx.textAlign='center';
  ctx.fillText(brand,x+9,y+8);
  px(x+3,y+10,12,4,'#ccc');
  ctx.fillStyle='#333';ctx.font='5px monospace';ctx.textAlign='center';
  ctx.fillText('⛽',x+9,y+24);
}
function drawTrafficLight(x,y,state){
  px(x,y,8,22,'#222');
  px(x+1,y+1,6,6,state===0?'#ff2200':'#330000');
  px(x+1,y+8,6,6,state===1?'#ffcc00':'#332200');
  px(x+1,y+15,6,6,state===2?'#00cc44':'#003300');
}
function drawPothole(x,y,big){
  const rw=big?13:9,rh=big?8:6;
  ctx.save();ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x,y,rw,rh,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(x,y,rw+1,rh+1,0,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#181818';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x-rw*.5,y-1);ctx.lineTo(x+rw*.5,y+1);ctx.stroke();ctx.restore();
}
function drawMudPuddle(x,y){
  ctx.save();ctx.fillStyle='rgba(60,40,20,.7)';ctx.beginPath();ctx.ellipse(x,y,14,8,0,0,Math.PI*2);ctx.fill();ctx.restore();
}
function drawRainDrop(x,y){
  ctx.save();ctx.strokeStyle='rgba(120,160,255,.6)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-1,y+6);ctx.stroke();ctx.restore();
}
function drawExplosion(x,y,t){
  const r=(60-t)*1.6;
  ctx.globalAlpha=Math.max(0,t/60);ctx.shadowColor='#ff6600';ctx.shadowBlur=22;
  ['#f00','#f60','#fc0','#fff'].forEach((c,i)=>{
    ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,Math.max(0,r-i*4),0,Math.PI*2);ctx.stroke();
  });
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+(60-t)*.12,pr=r*.85;
    px(x+Math.cos(a)*pr-2,y+Math.sin(a)*pr-2,4,4,['#f00','#f60','#fc0','#fff'][i%4]);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ═══════════════════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════════════════
class Player {
  constructor(){this.reset();}
  reset(){
    this.x=CW/2;this.y=CH-80;this.w=16;this.h=26;
    this.vx=0;this.speed=0;this.maxSpd=165;
    this.alive=true;this.skidding=false;this.skidT=0;this.skidDir=0;
    this.exploding=false;this.explT=0;this.inv=0;this.fuel=100;
  }
  update(cfg){
    if(!this.alive)return;
    if(this.inv>0)this.inv--;
    const slip=(cfg.mud&&Math.random()<.002)?true:false;
    if(slip&&!this.skidding)this.startSkid(Math.random()<.5?-1:1);
    this.fuel-=cfg.fuelDrain;
    if(this.fuel<=0){this.fuel=0;this.explode();return;}
    this.speed=Math.min(this.speed+0.85,this.maxSpd);
    if(this.skidding){
      this.x+=this.skidDir*(cfg.mud?2.2:1.8);this.skidT--;
      if(this.skidT<=0)this.skidding=false;
    } else {
      const accel=cfg.mud?0.85:1.1;
      if(KEYS['ArrowLeft']||KEYS['left'])   this.vx=Math.max(this.vx-accel,-4.5);
      else if(KEYS['ArrowRight']||KEYS['right'])this.vx=Math.min(this.vx+accel, 4.5);
      else this.vx*=cfg.mud?.78:.82;
      this.x+=this.vx;
    }
    if(this.x<RL+this.w/2){this.x=RL+this.w/2;if(Math.abs(this.vx)>1)this.startSkid(-1);this.vx=0;}
    if(this.x>RR-this.w/2){this.x=RR-this.w/2;if(Math.abs(this.vx)>1)this.startSkid(1);this.vx=0;}
    setEngineSpeed(this.speed/this.maxSpd);
  }
  startSkid(dir){
    if(this.inv>0)return;
    this.skidding=true;this.skidT=32;this.skidDir=dir;this.inv=55;sndSkid();
  }
  explode(){
    if(this.exploding)return;
    this.exploding=true;this.explT=60;this.alive=false;sndCrash();
  }
  draw(){
    if(this.exploding){drawExplosion(this.x,this.y,this.explT);this.explT--;return;}
    if(!this.alive)return;
    if(this.inv>0&&Math.floor(this.inv/5)%2===0)return;
    const x=Math.round(this.x-this.w/2),y=Math.round(this.y-this.h/2);
    px(x+4,y,   8,4,'#ff69b4');px(x+2,y+3,12,14,'#ff1493');
    px(x,  y+5, 3,8,'#ff69b4');px(x+13,y+5,3,8,'#ff69b4');
    px(x+5,y+4, 6,4,'#88eeff');px(x+3,y+16,10,5,'#cc1177');
    px(x,  y+6, 3,5,'#222');px(x+13,y+6,3,5,'#222');
    px(x+1,y+14,3,5,'#222');px(x+12,y+14,3,5,'#222');
    if(this.skidding){
      ctx.fillStyle='rgba(90,90,90,.6)';ctx.fillRect(x+4,y+22,3,9);ctx.fillRect(x+9,y+22,3,9);
    }
  }
  getRect(){return{x:this.x-this.w/2+2,y:this.y-this.h/2+2,w:this.w-4,h:this.h-4};}
}

// ═══════════════════════════════════════════════════════════
// VEHICLE  (generic traffic)
// ═══════════════════════════════════════════════════════════
class Vehicle {
  constructor(type,lane,cfg){
    this.type=type;this.lane=lane;this.x=LANES[lane];
    this.speed=cfg.speed*(type==='bus'?.3:type==='camion'?.25:type==='truck'?.35:.5+rnd(0,.55));
    this.clT=rnd(60,160);this.tX=this.x;
    this.lineNum=BUS_LINES[Math.floor(Math.random()*BUS_LINES.length)];
    this.colorIdx=Math.floor(Math.random()*7);
    // Fuel-giving autos: multicolored
    this.givesFuel=['car','taxi'].includes(type)&&Math.random()<.28;
    this.fuelColor=['#ff4400','#4488ff','#ffee00','#00cc44','#aa44ff','#ff8800','#00cccc'][this.colorIdx];
    switch(type){
      case 'bus':   this.w=22;this.h=50;break;
      case 'camion':this.w=20;this.h=56;break;
      case 'truck': this.w=18;this.h=38;break;
      case 'moto':  this.w=12;this.h=18;break;
      case 'bike':  this.w=12;this.h=16;break;
      case 'pedestrian':this.w=8;this.h=18;break;
      default:      this.w=14;this.h=22;
    }
    this.y=-this.h-rnd(0,40);
  }
  update(ps){
    this.y+=(ps*.04)-this.speed*.5;
    this.clT--;
    if(this.clT<=0&&Math.random()<.28){
      this.lane=Math.floor(Math.random()*LC);this.tX=LANES[this.lane];
      this.clT=rnd(70,160);
    }
    this.x+=(this.tX-this.x)*.055;
  }
  draw(){
    const x=Math.round(this.x-this.w/2),y=Math.round(this.y-this.h/2);
    switch(this.type){
      case 'car':   drawCar(x,y,this.givesFuel?this.fuelColor:'#cc4422',this.w,this.h);break;
      case 'taxi':  drawTaxi(x,y);break;
      case 'moto':  drawMoto(x,y);break;
      case 'bike':  drawBike(x,y);break;
      case 'bus':   drawBus(x,y,this.lineNum);break;
      case 'truck': drawTruck(x,y);break;
      case 'camion':drawCamion(x,y);break;
      case 'police':drawPolice(x,y);break;
      case 'pedestrian':drawPedestrian(x,y);break;
      default:drawCar(x,y,'#888',this.w,this.h);
    }
    // Fuel indicator on fuel-giving cars
    if(this.givesFuel){
      ctx.save();ctx.fillStyle='#00ff88';ctx.font='bold 6px monospace';ctx.textAlign='center';
      ctx.fillText('⛽',this.x,y-2);ctx.restore();
    }
  }
  getRect(){return{x:this.x-this.w/2+1,y:this.y-this.h/2+1,w:this.w-2,h:this.h-2};}
  off(){return this.y>CH+80;}
}

// ═══════════════════════════════════════════════════════════
// OBSTACLE  (pothole, mud, puddle)
// ═══════════════════════════════════════════════════════════
class Obstacle {
  constructor(type){
    this.type=type;
    const lane=Math.floor(Math.random()*LC);
    this.x=LANES[lane]+rnd(-14,14);this.y=-20;
    this.big=Math.random()<.35;
  }
  update(ps){this.y+=ps*.04;}
  draw(){
    if(this.type==='pothole')drawPothole(this.x,this.y,this.big);
    else if(this.type==='mud')drawMudPuddle(this.x,this.y);
  }
  getRect(){const s=this.big?12:8;return{x:this.x-s,y:this.y-s*.6,w:s*2,h:s*1.2};}
  off(){return this.y>CH+30;}
}

// ═══════════════════════════════════════════════════════════
// FUEL STATION
// ═══════════════════════════════════════════════════════════
class GasStation {
  constructor(){
    this.side=Math.random()<.5?'L':'R';
    this.x=this.side==='L'?14:CW-14;
    this.y=-40;
    this.brand=Math.random()<.5?'YPF':'SHELL';
    this.used=false;
    this.w=18;this.h=28;
    this.glow=0;
  }
  update(ps){this.y+=ps*.04;if(this.glow>0)this.glow--;}
  draw(){
    const x=Math.round(this.x-9),y=Math.round(this.y-14);
    drawGasStation(x,y,this.brand);
    if(this.glow>0){ctx.save();ctx.strokeStyle=`rgba(0,255,136,${this.glow/30})`;ctx.lineWidth=3;ctx.strokeRect(x-2,y-2,22,32);ctx.restore();}
  }
  getRect(){return{x:this.x-9,y:this.y-14,w:18,h:28};}
  off(){return this.y>CH+60;}
}

// ═══════════════════════════════════════════════════════════
// TRAFFIC LIGHT
// ═══════════════════════════════════════════════════════════
class TrafficLight {
  constructor(){
    this.x=LANES[Math.floor(Math.random()*LC)];
    this.y=-40;this.state=2; // 0=red,1=yellow,2=green
    this.stateT=rnd(180,320);this.w=8;this.h=22;
    this.penaltyZone=false;
  }
  update(ps){
    this.y+=ps*.04;
    this.stateT--;
    if(this.stateT<=0){
      this.state=(this.state+1)%3;
      this.stateT=this.state===1?40:rnd(150,280);
    }
  }
  draw(){
    const x=Math.round(this.x-4),y=Math.round(this.y-11);
    // pole
    px(x+3,y+22,2,30,'#888');
    drawTrafficLight(x,y,this.state);
  }
  getRect(){return{x:this.x-4,y:this.y-11,w:8,h:22};}
  off(){return this.y>CH+60;}
}

// ═══════════════════════════════════════════════════════════
// SCENERY (roadside decorations)
// ═══════════════════════════════════════════════════════════
class Road {
  constructor(cfg){
    this.cfg=cfg;this.offset=0;this.crvOff=0;this.crvTgt=0;this.crvSpd=0;
    this.scenery=[];this.rainDrops=[];
    for(let i=0;i<22;i++)this.scenery.push(this.newScenery(Math.random()*CH));
    if(cfg.rain)for(let i=0;i<60;i++)this.rainDrops.push({x:rnd(0,CW),y:rnd(0,CH)});
  }
  newScenery(y){
    const side=Math.random()<.5?'L':'R';
    const x=side==='L'?rnd(2,RL-4):rnd(RR+4,CW-4);
    return{x,y,type:Math.floor(Math.random()*5),color:['#226622','#338833','#116611','#aa6600','#556633'][Math.floor(Math.random()*5)]};
  }
  update(ps){
    this.offset=(this.offset+ps*.32)%40;
    if(Math.random()<this.cfg.curveFreq){this.crvTgt=(Math.random()-.5)*55;this.crvSpd=.03;}
    this.crvOff+=(this.crvTgt-this.crvOff)*this.crvSpd;
    this.scenery.forEach(s=>{s.y+=ps*.12;if(s.y>CH+20)Object.assign(s,this.newScenery(-20));});
    if(this.cfg.rain)this.rainDrops.forEach(r=>{r.y+=6+ps*.04;r.x-=.5;if(r.y>CH){r.y=-4;r.x=rnd(0,CW);}});
  }
  draw(){
    const bg=this.cfg.bgRoad;
    // Night overlay
    if(this.cfg.dark){
      ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,CW,CH);
      // Player headlight cone
      const grd=ctx.createRadialGradient(CW/2,CH-80,5,CW/2,CH-120,140);
      grd.addColorStop(0,'rgba(255,255,200,.18)');grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);
    }
    ctx.fillStyle=this.cfg.bgSide;ctx.fillRect(0,0,RL,CH);ctx.fillRect(RR,0,CW-RR,CH);
    ctx.fillStyle=bg;ctx.fillRect(RL,0,RW,CH);
    // Dirt patches on dirt roads
    if(this.cfg.dirt){
      ctx.fillStyle='rgba(100,75,30,.15)';
      for(let i=0;i<5;i++)ctx.fillRect(RL+rnd(0,RW-20),rnd(0,CH),rnd(10,40),rnd(4,12));
    }
    // Lane markings
    ctx.fillStyle=this.cfg.dark?'#555566':'#666677';
    for(let y=-40+this.offset;y<CH+40;y+=40){
      ctx.fillRect(RL+LW-1,y,2,22);ctx.fillRect(RL+LW*2-1,y,2,22);
    }
    // Road edges
    ctx.fillStyle='#ff0066';ctx.fillRect(RL,0,3,CH);ctx.fillRect(RR-3,0,3,CH);
    this.scenery.forEach(s=>this.drawS(s));
    if(this.cfg.rain){
      this.rainDrops.forEach(r=>drawRainDrop(r.x,r.y));
      // Rain darkening overlay
      ctx.fillStyle='rgba(10,20,50,.12)';ctx.fillRect(0,0,CW,CH);
    }
  }
  drawS(s){
    const x=Math.round(s.x),y=Math.round(s.y);
    switch(s.type){
      case 0:px(x-2,y,6,8,'#334433');px(x-4,y-6,10,8,s.color);px(x-2,y-10,6,6,s.color);break;
      case 1:px(x-5,y-12,12,16,'#334455');px(x-3,y-10,3,3,'#ffee44');px(x+2,y-10,3,3,'#ffee44');px(x-3,y-5,3,3,'#aaddff');break;
      case 2:px(x-3,y-2,8,5,'#224422');px(x-5,y-4,12,6,s.color);break;
      case 3:px(x,y-8,2,12,'#777');px(x-4,y-12,10,6,'#bb3300');ctx.fillStyle='#fff';ctx.font='4px monospace';ctx.textAlign='center';ctx.fillText('KM',x+1,y-8);break;
      case 4:px(x-4,y-10,10,14,'#225522');px(x-6,y-16,14,8,s.color);px(x-2,y-22,6,8,s.color);break;
    }
  }
}

function initLivesUI(){
  const row=document.getElementById('lives-row');row.innerHTML='';
  for(let i=0;i<MAX_LIVES;i++){const d=document.createElement('div');d.className='life-dot'+(i>=lives?' lost':'');d.id=`life-${i}`;row.appendChild(d);}
}
function updateLivesUI(){
  for(let i=0;i<MAX_LIVES;i++){const d=document.getElementById(`life-${i}`);if(d)d.className='life-dot'+(i>=lives?' lost':'');}
}

function initLevel(){
  const cfg=LEVEL_CFG[level-1];
  targetDist=cfg.targetDist;distance=0;levelDone=false;
  vehicles=[];obstacles=[];stations=[];lights=[];
  spawnT=0;fuelT=200;obsT=130;stationT=rnd(350,550);lightT=cfg.hasTrafficLight?rnd(200,380):999999;
  usedStationThisLevel=false;noteT=0;
  road=new Road(cfg);
  player.speed=55+level*10;
  updateLivesUI();
  document.getElementById('ui-lvl').textContent=level;
  document.getElementById('ui-zona').textContent=cfg.name;
}

// ── SPAWN LOGIC ──
function pickType(cfg){
  const sp=cfg.spawns;const r=Math.random();let acc=0;
  for(const[type,prob]of Object.entries(sp)){acc+=prob;if(r<acc)return type;}
  return 'car';
}
function spawnVehicle(){
  const cfg=LEVEL_CFG[level-1];
  const type=pickType(cfg);
  const lane=Math.floor(Math.random()*LC);
  vehicles.push(new Vehicle(type,lane,cfg));
}

function showLevelOK(){
  const next=level+1;const cfg=LEVEL_CFG[next-1];
  gameState='levelcomplete';
  showOv(`<div class="ov1" style="color:#00ff88">✅ ${LEVEL_CFG[level-1].name}</div><div class="ov2">COMPLETADO</div><div class="ovs">${score.toLocaleString()}</div><div class="ovp" style="color:${cfg.color};margin-top:6px">▶ SIGUIENTE: ${cfg.name}</div>`);
  setTimeout(()=>{
    if(gameState!=='levelcomplete')return;
    level=next;player.alive=true;player.exploding=false;
    player.fuel=Math.min(100,player.fuel+50);
    player.x=CW/2;player.y=CH-80;player.vx=0;player.skidding=false;player.inv=0;
    initLevel();hideOv();gameState='playing';
    showBadge(`<div style="color:${LEVEL_CFG[level-1].color}">ZONA ${level}<br>${LEVEL_CFG[level-1].name}</div>`);
  },2200);

function startGame(){
  hideOv();
  lives=MAX_LIVES;level=1;score=0;
  player=new Player();
  initLevel();
  gameState='playing';
  startEngine();startCumbia();
  if(rafId)cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(loop);
}
function restartFull(){
  hideOv();
  KEYS['left']=false;KEYS['right']=false; // clear stuck keys
  lives=MAX_LIVES;level=1;score=0;
  player=new Player();
  initLevel();
  gameState='playing';
  startEngine();startCumbia();
}

// ── COLLISIONS ──
function checkCollisions(){
  if(!player.alive||player.inv>0)return;
  const pr=player.getRect();
  const cfg=LEVEL_CFG[level-1];

  for(const v of vehicles){
    const vr=v.getRect();
    if(!ov(pr,vr))continue;
    const ox=Math.min(pr.x+pr.w,vr.x+vr.w)-Math.max(pr.x,vr.x);
    const oy=Math.min(pr.y+pr.h,vr.y+vr.h)-Math.max(pr.y,vr.y);
    // Sidescrape → skid
    if(ox<5||oy<3){player.startSkid(player.x<v.x?-1:1);continue;}
    // Fuel-giving car: gain fuel, no damage
    if(v.givesFuel){
      player.fuel=Math.min(100,player.fuel+15);score+=300;sndFuel();
      v.givesFuel=false;v.fuelColor='#888';continue;
    }
    // Real crash → lose a life
    player.explode();
    lives--;updateLivesUI();
    if(lives<=0)setTimeout(showGameOver,800);
    return;
  }

  // Obstacles
  obstacles=obstacles.filter(o=>{
    if(!ov(pr,o.getRect()))return true;
    if(!player.skidding){player.startSkid(player.vx>=0?1:-1);sndBump();}
    return false;
  });

  // Gas stations (50% fill, once per level)
  stations.forEach(s=>{
    if(s.used||!ov(pr,s.getRect()))return;
    if(!usedStationThisLevel){
      player.fuel=Math.min(100,player.fuel+50);
      score+=1000;s.used=true;s.glow=30;
      usedStationThisLevel=true;sndFuel();
      showBadge('<div style="color:#00ff88">⛽ +50% NAFTA</div>');
    }
  });

  // Traffic lights: penalty for red
  lights.forEach(tl=>{
    if(!ov(pr,tl.getRect()))return;
    if(tl.state===0&&!player.skidding){
      player.fuel=Math.max(0,player.fuel-12);score=Math.max(0,score-500);
      player.startSkid(Math.random()<.5?-1:1);
      showBadge('<div style="color:#ff2200">🚦 ROJO −12% NAFTA</div>');
    }
  });
}

// ── HUD UPDATE ──
function updateHUD(){
  document.getElementById('ui-spd').textContent=Math.round(player.speed*1.2);
  document.getElementById('ui-score').textContent=score.toLocaleString();
  const fp=Math.max(0,player.fuel);
  document.getElementById('ui-fuel').textContent=Math.round(fp)+'%';
  document.getElementById('fuel-fill').style.width=fp+'%';
  document.getElementById('fuel-fill').style.background=fp>60?'linear-gradient(90deg,#00cc44,#00ff88)':fp>25?'linear-gradient(90deg,#ff8800,#ffcc00)':'linear-gradient(90deg,#ff0000,#ff6600)';
  const prog=Math.min(100,(distance/targetDist)*100);
  document.getElementById('ui-prog').textContent=Math.round(prog)+'%';
  document.getElementById('prog-fill').style.width=prog+'%';
}

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
function loop(){
  rafId=requestAnimationFrame(loop);
  if(gameState!=='playing')return;

  const cfg=LEVEL_CFG[level-1];

  // Update
  road.update(player.speed);
  player.update(cfg);

  // Explosion done
  if(player.exploding&&player.explT<=0){
    player.exploding=false;
    if(lives<=0)return; // already handled
    if(player.fuel<=0&&lives<=0){showGameOver();return;}
    player.alive=true;player.x=CW/2;player.y=CH-80;player.vx=0;player.skidding=false;player.inv=130;
  }

  // Spawns
  spawnT--;if(spawnT<=0){spawnVehicle();const iv=Math.max(38,100-level*8);spawnT=iv+rnd(0,iv*.5);}
  fuelT--;if(fuelT<=0){vehicles.push(new Vehicle('car',Math.floor(Math.random()*LC),cfg));vehicles[vehicles.length-1].givesFuel=true;fuelT=rnd(200,320);}
  obsT--;if(obsT<=0){obstacles.push(new Obstacle(cfg.mud&&Math.random()<.4?'mud':'pothole'));obsT=rnd(90,160);}
  stationT--;if(stationT<=0&&!usedStationThisLevel){stations.push(new GasStation());stationT=rnd(400,700);}
  if(cfg.hasTrafficLight){lightT--;if(lightT<=0){lights.push(new TrafficLight());lightT=rnd(250,420);}}

  vehicles.forEach(v=>v.update(player.speed));
  obstacles.forEach(o=>o.update(player.speed));
  stations.forEach(s=>s.update(player.speed));
  lights.forEach(tl=>tl.update(player.speed));

  vehicles=vehicles.filter(v=>!v.off());
  obstacles=obstacles.filter(o=>!o.off());
  stations=stations.filter(s=>!s.off());
  lights=lights.filter(tl=>!tl.off());

  if(player.alive){distance+=player.speed*.01;score+=Math.floor(player.speed*.007);}

  checkCollisions();

  // Level complete
  if(player.alive&&!levelDone&&distance>=targetDist){
    levelDone=true;score+=5000+Math.floor(player.fuel*120);
    if(level>=5)showWin();else showLevelOK();
    return;
  }

  // ── DRAW ──
  road.draw();
  obstacles.forEach(o=>o.draw());
  stations.forEach(s=>s.draw());
  lights.forEach(tl=>tl.draw());
  vehicles.forEach(v=>v.draw());
  player.draw();

  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.045)';
  for(let y=0;y<CH;y+=2)ctx.fillRect(0,y,CW,1);

  updateHUD();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  resize();
  // Static preview canvas
  ctx.fillStyle='#111122';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#222228';ctx.fillRect(RL,0,RW,CH);
  ctx.fillStyle='#ff0066';ctx.fillRect(RL,0,3,CH);ctx.fillRect(RR-3,0,3,CH);
  [[120,200,'#ff4400'],[160,320,'#4488ff'],[140,100,'#ffee00']].forEach(([x,y,c])=>{
    ctx.fillStyle=c;ctx.fillRect(x-7,y-11,14,22);ctx.fillStyle='#aaddff';ctx.fillRect(x-5,y-9,10,6);
  });
  ctx.fillStyle='#ff1493';ctx.fillRect(CW/2-8,CH-90,16,26);
  showStart();
});
</script>
