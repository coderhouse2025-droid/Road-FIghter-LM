<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Matanza Road Fighter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;}
#wrap{position:fixed;inset:0;background:#000;overflow:hidden;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;position:absolute;}

/* ── HUD ── */
#ui{position:absolute;pointer-events:none;font-family:'Share Tech Mono',monospace;}
#hud-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:4px;gap:3px;}
.hp{background:rgba(0,0,0,.85);border:1px solid #ff006677;padding:2px 4px;text-align:center;flex:1;min-width:0;}
.hpt{color:#ff0066;font-size:6px;letter-spacing:1px;text-transform:uppercase;}
.hpv{font-size:13px;font-weight:bold;color:#fff;line-height:1.1;}
#hud-bot{position:absolute;bottom:0;left:0;right:0;padding:3px 4px;display:flex;flex-direction:column;gap:2px;}
.brow{background:rgba(0,0,0,.85);border:1px solid #ffffff18;padding:2px 4px;}
.blbl{color:#ff0066;font-size:6px;letter-spacing:1px;display:flex;justify-content:space-between;margin-bottom:1px;}
.btrk{height:7px;background:#1a1a1a;border:1px solid #333;border-radius:2px;overflow:hidden;}
.bfil{height:100%;transition:width .12s;border-radius:2px;}
#lives-row{display:flex;gap:5px;justify-content:center;padding:2px 0;}
.life-dot{width:9px;height:9px;border-radius:50%;background:#ff0066;box-shadow:0 0 5px #ff0066aa;}
.life-dot.lost{background:#2a2a2a;box-shadow:none;}

/* ── OVERLAY (fullscreen) ── */
#overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:7%;z-index:20;text-align:center;font-family:'Share Tech Mono',monospace;}
#ov-bg{position:absolute;inset:0;background-size:cover;background-position:center top;opacity:0;transition:opacity .5s;}
#ov-bg.on{opacity:1;}
#ov-bg::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.02) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,.72) 60%,rgba(0,0,0,.96) 100%);}
#ov-cnt{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0 12px;width:100%;}
.ov1{font-family:'Boogaloo',cursive;font-size:clamp(20px,5.5vw,34px);color:#ff0066;
  text-shadow:0 0 20px #ff0066,0 0 40px #ff006644,2px 2px 0 #000;letter-spacing:2px;line-height:1.1;}
.ov2{font-size:clamp(7px,2vw,11px);color:#ffdd00;letter-spacing:3px;text-shadow:0 0 8px #ffdd0066;}
.ovp{font-size:clamp(6px,1.8vw,10px);color:#bbb;line-height:1.9;}
.ovw{color:#ff6600;font-size:clamp(6px,1.7vw,9px);text-shadow:0 0 6px #ff660066;}
.ovs{font-size:clamp(20px,5vw,30px);color:#00ff88;text-shadow:0 0 14px #00ff88;}
.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.badge{background:rgba(0,0,0,.65);border:1px solid #ff006644;color:#ff88aa;font-size:clamp(5px,1.4vw,8px);padding:2px 6px;letter-spacing:.5px;}
.sbtn{margin-top:8px;padding:clamp(7px,1.8vw,11px) clamp(16px,4vw,28px);
  background:linear-gradient(180deg,#ff2277,#cc0055);color:#fff;border:none;
  font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.4vw,13px);letter-spacing:3px;cursor:pointer;
  text-transform:uppercase;animation:blink .85s infinite;
  box-shadow:0 0 18px #ff006699,0 3px 0 #880033;pointer-events:all;border-radius:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sbtn:hover,.sbtn:active{background:linear-gradient(180deg,#ff44aa,#ff0066);animation:none;}

/* ── CIRCUIT SELECT ── */
#circuit-select{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;z-index:22;font-family:'Share Tech Mono',monospace;
  background:linear-gradient(180deg,#050510 0%,#0a0520 50%,#050510 100%);}
#cs-title{font-family:'Boogaloo',cursive;font-size:clamp(18px,4.5vw,28px);color:#ff0066;
  text-shadow:0 0 20px #ff0066,2px 2px 0 #000;letter-spacing:2px;margin-bottom:4px;}
#cs-sub{font-size:clamp(7px,1.8vw,10px);color:#ffdd00;letter-spacing:3px;margin-bottom:14px;
  text-shadow:0 0 8px #ffdd0066;}
#cs-grid{display:flex;flex-direction:column;gap:6px;width:90%;max-width:260px;}
.cs-card{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  border:1px solid rgba(255,255,255,.1);
  padding:8px 10px;cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .15s,background .15s;border-radius:4px;
}
.cs-card:hover,.cs-card:active{
  border-color:#ff006688;
  background:linear-gradient(135deg,rgba(255,0,102,.12),rgba(255,0,102,.04));
}
.cs-card.locked{opacity:.4;cursor:default;}
.cs-card.locked:hover{border-color:rgba(255,255,255,.1);background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01));}
.cs-num{font-size:clamp(18px,4.5vw,26px);font-weight:bold;width:28px;text-align:center;flex-shrink:0;}
.cs-info{flex:1;text-align:left;}
.cs-name{font-size:clamp(8px,2vw,11px);color:#fff;letter-spacing:1px;font-weight:bold;}
.cs-diff{font-size:clamp(6px,1.5vw,8px);color:#888;letter-spacing:.5px;margin-top:1px;}
.cs-stars{color:#ffdd00;font-size:8px;letter-spacing:1px;}
.cs-trophy{font-size:clamp(14px,3.5vw,20px);flex-shrink:0;width:24px;text-align:center;}
.cs-bar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,#ff0066,transparent);}
/* Glow on completed */
.cs-card.done{border-color:#ffdd0055;}
.cs-card.done .cs-num{text-shadow:0 0 10px currentColor;}
#cs-back{margin-top:12px;font-size:clamp(8px,2vw,10px);color:#555;cursor:pointer;letter-spacing:2px;padding:4px 10px;}
#cs-back:hover{color:#ff0066;}

/* ── LEVEL BADGE ── */
#lvl-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:18;text-align:center;pointer-events:none;display:none;}
#lvl-badge-inner{font-family:'Boogaloo',cursive;color:#ffdd00;
  text-shadow:0 0 20px #ffaa00,2px 2px 0 #000;animation:badgePop .4s ease-out;}
@keyframes badgePop{0%{transform:scale(.4);opacity:0}65%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}

/* ── MOBILE CONTROLS ── */
#mctrl{position:fixed;bottom:0;left:0;right:0;height:80px;display:none;
  justify-content:space-between;align-items:center;padding:8px 16px;
  background:rgba(0,0,0,.75);z-index:25;backdrop-filter:blur(4px);}
.mbtn{width:80px;height:62px;background:rgba(255,0,102,.15);
  border:2px solid #ff006688;color:#fff;font-size:30px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  touch-action:none;user-select:none;box-shadow:0 0 10px #ff006633;}
.mbtn:active{background:rgba(255,0,102,.45);box-shadow:0 0 18px #ff006688;}
@media(pointer:coarse){#mctrl{display:flex;}}

/* ── MISC ── */
#note-flash{position:absolute;top:22%;left:50%;transform:translateX(-50%);
  font-size:22px;opacity:0;pointer-events:none;z-index:16;transition:opacity .2s;}
</style>
</head>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// GLOBAL INPUT – registered ONCE
// ═══════════════════════════════════════════════════════════
const KEYS = {};
window.addEventListener('keydown', e => {
  KEYS[e.key] = true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
}, {passive:false});
window.addEventListener('keyup', e => { KEYS[e.key] = false; });

document.getElementById('btnL').addEventListener('touchstart', e=>{e.preventDefault();KEYS['left']=true;},{passive:false});
document.getElementById('btnL').addEventListener('touchend',   e=>{e.preventDefault();KEYS['left']=false;},{passive:false});
document.getElementById('btnL').addEventListener('touchcancel',()=>{KEYS['left']=false;});
document.getElementById('btnR').addEventListener('touchstart', e=>{e.preventDefault();KEYS['right']=true;},{passive:false});
document.getElementById('btnR').addEventListener('touchend',   e=>{e.preventDefault();KEYS['right']=false;},{passive:false});
document.getElementById('btnR').addEventListener('touchcancel',()=>{KEYS['right']=false;});

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let AC=null,engOsc1=null,engOsc2=null,engLfo=null,engGain=null,engOn=false;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}

function startEngine(){
  if(engOn)return;
  const ac=getAC();
  engGain=ac.createGain();engGain.gain.value=.13;engGain.connect(ac.destination);
  engOsc1=ac.createOscillator();engOsc1.type='sawtooth';engOsc1.frequency.value=50;
  engOsc2=ac.createOscillator();engOsc2.type='square';engOsc2.frequency.value=100;
  engLfo=ac.createOscillator();engLfo.frequency.value=6;
  const lg=ac.createGain();lg.gain.value=7;engLfo.connect(lg);lg.connect(engOsc1.frequency);
  const ws=ac.createWaveShaper();
  const cv=new Float32Array(256);
  for(let i=0;i<256;i++){const x=(i*2)/256-1;cv[i]=(Math.PI+200)*x/(Math.PI+200*Math.abs(x));}
  ws.curve=cv;
  const mx=ac.createGain();mx.gain.value=.45;
  engOsc1.connect(ws);engOsc2.connect(mx);ws.connect(mx);mx.connect(engGain);
  engOsc1.start();engOsc2.start();engLfo.start();engOn=true;
}
function stopEngine(){
  if(!engOn)return;
  try{engOsc1.stop();engOsc2.stop();engLfo.stop();}catch(e){}
  engOn=false;engOsc1=engOsc2=engLfo=null;
}
function setEngineSpeed(r){
  if(!engOn)return;const ac=getAC();const v=Math.max(.08,r);
  engOsc1.frequency.setTargetAtTime(42+v*145,ac.currentTime,.08);
  engOsc2.frequency.setTargetAtTime((42+v*145)*2.05,ac.currentTime,.08);
  engGain.gain.setTargetAtTime(.08+v*.11,ac.currentTime,.05);
}
function sndSkid(){
  const ac=getAC();
  const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.5),ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.8;
  const src=ac.createBufferSource();src.buffer=buf;
  const bpf=ac.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=1600;bpf.Q.value=1;
  const g=ac.createGain();g.gain.setValueAtTime(.5,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+.5);
  src.connect(bpf);bpf.connect(g);g.connect(ac.destination);src.start();
}
function sndBump(){
  const ac=getAC();const o=ac.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(130,ac.currentTime);o.frequency.exponentialRampToValueAtTime(35,ac.currentTime+.2);
  const g=ac.createGain();g.gain.setValueAtTime(.5,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.22);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.25);
}
function sndCrash(){
  const ac=getAC();const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.65),ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.3);
  const src=ac.createBufferSource();src.buffer=buf;
  const lpf=ac.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=800;
  const g=ac.createGain();g.gain.setValueAtTime(.85,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.65);
  src.connect(lpf);lpf.connect(g);g.connect(ac.destination);src.start();
}
function sndFuel(){
  const ac=getAC();[0,.08,.18].forEach((t,i)=>{
    const o=ac.createOscillator();o.type='sine';o.frequency.value=500+i*220;
    const g=ac.createGain();g.gain.setValueAtTime(0,ac.currentTime+t);g.gain.linearRampToValueAtTime(.28,ac.currentTime+t+.04);g.gain.linearRampToValueAtTime(0,ac.currentTime+t+.16);
    o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.2);
  });
}
let cumbiaIv=null;
function startCumbia(){
  if(cumbiaIv)return;
  const pat=[200,0,170,0,150,0,170,200];let step=0;
  cumbiaIv=setInterval(()=>{
    if(!engOn){stopCumbia();return;}
    const ac=getAC();const v=pat[step%pat.length];
    if(v>0){
      const o=ac.createOscillator();o.type='triangle';
      o.frequency.setValueAtTime(v,ac.currentTime);o.frequency.exponentialRampToValueAtTime(v*.5,ac.currentTime+.1);
      const g=ac.createGain();g.gain.setValueAtTime(.065,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.13);
      o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.15);
      if(Math.random()<.2){const nf=document.getElementById('note-flash');nf.style.opacity='.7';setTimeout(()=>nf.style.opacity='0',140);}
    }
    step++;
  },210);
}
function stopCumbia(){if(cumbiaIv){clearInterval(cumbiaIv);cumbiaIv=null;}}

// ═══════════════════════════════════════════════════════════
// CANVAS / RESIZE
// ═══════════════════════════════════════════════════════════
const CW=280,CH=480;
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let cL=0,cT=0,cDW=CW,cDH=CH;

function resize(){
  const mob=window.matchMedia('(pointer:coarse)').matches;
  const avH=mob?window.innerHeight-80:window.innerHeight;
  const avW=window.innerWidth;
  const sc=Math.min(avH/CH,avW/CW);
  cDW=Math.floor(CW*sc);cDH=Math.floor(CH*sc);
  cL=Math.floor((avW-cDW)/2);cT=Math.floor((avH-cDH)/2);
  canvas.width=CW;canvas.height=CH;
  canvas.style.cssText=`width:${cDW}px;height:${cDH}px;left:${cL}px;top:${cT}px;`;
  ['ui','overlay','lvl-badge'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.cssText=(el.style.cssText||'')+`;width:${cDW}px;height:${cDH}px;left:${cL}px;top:${cT}px;position:absolute;`;
  });
  const cs=document.getElementById('circuit-select');
  cs.style.cssText+=`;width:${cDW}px;height:${cDH}px;left:${cL}px;top:${cT}px;position:absolute;`;
}
window.addEventListener('resize',resize);

// ═══════════════════════════════════════════════════════════
// LEVEL CONFIGS
// ═══════════════════════════════════════════════════════════
const LEVEL_CFG=[
  {name:'RAMOS MEJÍA',  emoji:'🏙️', diff:'★☆☆☆☆', color:'#88ccff',
   bgRoad:'#2c2c3a',bgSide:'#3a4a3a',sideTint:'#2a3a2a',
   speed:.85,  targetDist:1800,fuelDrain:.010,
   spawns:{car:.55,taxi:.2,moto:.12,bus:.08,bike:.05},
   rain:false,mud:false,dark:false,dirt:false,
   hasStation:true,hasTrafficLight:false,curveFreq:.0003},
  {name:'SAN JUSTO',    emoji:'🏘️', diff:'★★☆☆☆', color:'#ffdd44',
   bgRoad:'#262630',bgSide:'#2c3c2c',sideTint:'#222',
   speed:1.1,  targetDist:2200,fuelDrain:.013,
   spawns:{car:.48,taxi:.15,moto:.15,bus:.1,bike:.05,pedestrian:.07},
   rain:false,mud:false,dark:false,dirt:false,
   hasStation:true,hasTrafficLight:true,curveFreq:.0006},
  {name:'LAFERRERE',    emoji:'🏚️', diff:'★★★☆☆', color:'#ffaa44',
   bgRoad:'#1e1e22',bgSide:'#2e2a18',sideTint:'#1a1a10',
   speed:1.38, targetDist:2700,fuelDrain:.016,
   spawns:{car:.42,taxi:.1,moto:.15,bus:.12,bike:.05,pedestrian:.08,truck:.08},
   rain:false,mud:false,dark:false,dirt:true,
   hasStation:true,hasTrafficLight:false,curveFreq:.0009},
  {name:'GLEZ CATÁN',   emoji:'🌧️', diff:'★★★★☆', color:'#6699ff',
   bgRoad:'#181820',bgSide:'#1c2c14',sideTint:'#141c10',
   speed:1.65, targetDist:3200,fuelDrain:.019,
   spawns:{car:.38,taxi:.05,moto:.14,bus:.1,bike:.04,pedestrian:.06,truck:.12,camion:.11},
   rain:true,mud:true,dark:false,dirt:true,

  {name:'VIRREY PINO',  emoji:'🌙', diff:'★★★★★', color:'#cc88ff',

   speed:2.0,  targetDist:3800,fuelDrain:.022,
   spawns:{car:.32,taxi:.05,moto:.12,bus:.08,bike:.03,truck:.14,camion:.13,police:.13},
   rain:false,mud:false,dark:true,dirt:false,

];

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const RL=40,RR=240,RW=RR-RL,LC=3,LW=RW/LC;
const LANES=[RL+LW*.5,RL+LW*1.5,RL+LW*2.5];
const BUS_LINES=[88,96,174,180,378,620,621,630];
const MAX_LIVES=3;
const CAR_COLORS=['#e83030','#3366ee','#22bb55','#dd8800','#9922cc','#1199bb','#cc4488','#dd5500'];
const CAR_COLORS2=['#ff6644','#5588ff','#44dd77','#ffaa22','#bb44ee','#22ccdd','#ff66aa','#ff7722'];

// Persistent conquered levels (survives restart within same session)
const conquered = new Set();

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function dk(hex,f=.5){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${~~(r*f)},${~~(g*f)},${~~(b*f)})`;}
function lt(hex,f=1.6){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,~~(r*f))},${Math.min(255,~~(g*f))},${Math.min(255,~~(b*f))})`;}
function rects(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function rnd(a,b){return a+Math.random()*(b-a);}

// Generic car – more detailed with highlights & shadows
function drawCar(x,y,col,w,h){
  x=Math.round(x);y=Math.round(y);
  const c=col,sh=dk(col,.45),hi=lt(col,1.5),mid=dk(col,.7);
  // Shadow under car
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(x+1,y+h-2,w-2,3);
  // Body lower (trunk/hood)
  px(x+1,      y+Math.floor(h*.55), w-2, Math.floor(h*.38), mid);
  // Body main
  px(x,        y+Math.floor(h*.18), w,   Math.floor(h*.52), c);
  // Body highlight top strip
  px(x+1,      y+Math.floor(h*.18), w-2, 2, hi);
  // Cabin roof
  px(x+Math.floor(w*.18), y,   Math.floor(w*.64), Math.floor(h*.22), c);
  // Cabin highlight
  px(x+Math.floor(w*.2),  y+1, Math.floor(w*.6),  1, hi);
  // Windscreen
  px(x+Math.floor(w*.16), y+Math.floor(h*.06), Math.floor(w*.68), Math.floor(h*.18), '#c8ecff');
  px(x+Math.floor(w*.18), y+Math.floor(h*.07), Math.floor(w*.64), Math.floor(h*.06), '#e8f8ff');
  // Rear window
  px(x+Math.floor(w*.2),  y+Math.floor(h*.22), Math.floor(w*.6),  Math.floor(h*.1),  '#9ac8dd');
  // Hood / trunk panel
  px(x+Math.floor(w*.1),  y+Math.floor(h*.68), Math.floor(w*.8),  Math.floor(h*.2),  sh);
  // Wheels (fat pixel)
  const wy1=Math.floor(h*.2),wy2=Math.floor(h*.62);
  const wh=Math.floor(h*.24);
  px(x-2,y+wy1,4,wh,'#111');px(x-1,y+wy1+1,2,wh-2,'#333');
  px(x+w-2,y+wy1,4,wh,'#111');px(x+w-1,y+wy1+1,2,wh-2,'#333');
  px(x-2,y+wy2,4,wh,'#111');px(x-1,y+wy2+1,2,wh-2,'#333');
  px(x+w-2,y+wy2,4,wh,'#111');px(x+w-1,y+wy2+1,2,wh-2,'#333');
  // Headlights
  px(x+Math.floor(w*.08), y,2,2,'#ffff99');
  px(x+Math.floor(w*.72), y,2,2,'#ffff99');
  // Tail lights
  px(x+Math.floor(w*.08), y+h-2,2,2,'#ff3300');
  px(x+Math.floor(w*.72), y+h-2,2,2,'#ff3300');
  // Side stripe
  px(x,y+Math.floor(h*.38),1,Math.floor(h*.2),sh);
  px(x+w-1,y+Math.floor(h*.38),1,Math.floor(h*.2),sh);
}

function drawTaxi(x,y){
  drawCar(x,y,'#ffcc00',14,22);
  // Taxi sign on roof
  px(x+3,y-3,8,3,'#fff');
  ctx.fillStyle='#000';ctx.font='bold 4px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TAXI',x+7,y-1);
  // Checker strip
  for(let i=0;i<4;i++)px(x+1+i*3,y+5,2,2,i%2===0?'#000':'#ffcc00');
  for(let i=0;i<4;i++)px(x+1+i*3,y+7,2,2,i%2===0?'#ffcc00':'#000');
}

function drawMoto(x,y){
  // More detailed moto
  // Frame
  px(x+3,y+5,6,10,'#882200');
  // Wheels with spokes feel
  px(x+1,y+2, 4,5,'#111');px(x+2,y+3, 2,3,'#444');
  px(x+1,y+12,4,5,'#111');px(x+2,y+13,2,3,'#444');
  // Engine block
  px(x+2,y+6,8,5,'#cc4400');
  // Handlebar
  px(x+1,y+2,10,2,'#888');
  // Exhaust
  px(x+9,y+9,3,2,'#aaa');px(x+10,y+10,2,1,'#ccc');
  // Rider body
  px(x+3,y+1,6,6,'#cc3300');
  // Helmet
  px(x+4,y-1,4,4,'#333');px(x+5,y-1,2,2,'#555');
  // Visor
  px(x+4,y+1,4,1,'#88aacc');
}

function drawBike(x,y){
  // Wheels
  px(x+1,y+2, 4,5,'#111');px(x+2,y+3, 2,3,'#333');
  px(x+1,y+11,4,5,'#111');px(x+2,y+12,2,3,'#333');
  // Frame
  px(x+3,y+4, 6,8,'#228833');
  // Handlebar
  px(x+2,y+3,8,2,'#666');
  // Rider
  px(x+3,y,   4,5,'#dd7733');  // torso
  px(x+4,y-2, 3,3,'#ffcc88'); // head
  // Legs
  px(x+2,y+8, 2,6,'#334466');px(x+7,y+8,2,6,'#334466');
}

function drawBus(x,y,lineNum){
  const bw=22,bh=50;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(x+2,y+bh-1,bw-2,4);
  // Body
  px(x,y+2,bw,bh-4,'#1a3fbb');
  // Body highlight
  px(x+1,y+3,bw-2,2,'#2255dd');
  // Side stripe
  px(x,y+18,bw,2,'#ff6600');
  // Windows (2 cols x 4 rows)
  for(let r=0;r<4;r++){
    px(x+2, y+24+r*7, 7,5,'#aaddff');px(x+1, y+24+r*7, 1,5,'#88bbdd'); // left shadow
    px(x+13,y+24+r*7, 7,5,'#aaddff');px(x+12,y+24+r*7, 1,5,'#88bbdd');
    // Window glare
    px(x+2, y+24+r*7, 3,1,'#ddeeff');
    px(x+13,y+24+r*7, 3,1,'#ddeeff');
  }
  // Roof number panel
  px(x,   y,   bw,14,'#ffdd00');
  px(x+1, y+1, bw-2,12,'#111');
  ctx.save();ctx.fillStyle='#fff';ctx.font='bold 9px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(String(lineNum),x+bw/2,y+7);ctx.restore();
  // Front grille
  px(x+2,y+bh-6,bw-4,5,'#0d2a88');
  px(x+4,y+bh-5,3,3,'#ffff88');px(x+bw-7,y+bh-5,3,3,'#ffff88');
  // Wheels (large)
  px(x-2,y+6, 4,8,'#111');px(x-1,y+7, 2,6,'#333');
  px(x+bw-2,y+6, 4,8,'#111');px(x+bw-1,y+7,2,6,'#333');
  px(x-2,y+bh-17,4,8,'#111');px(x-1,y+bh-16,2,6,'#333');
  px(x+bw-2,y+bh-17,4,8,'#111');px(x+bw-1,y+bh-16,2,6,'#333');
  // Door line
  px(x+bw-5,y+18,1,bh-24,'#0d2a88');
}

function drawTruck(x,y){
  const tw=18,th=38;
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(x+2,y+th,tw-2,3);
  // Cargo
  px(x,y+14,tw,th-14,'#4a7a4a');
  px(x+1,y+15,tw-2,2,'#6a9a6a');
  // Cabin
  px(x+1,y,tw-2,16,'#3a6a3a');
  px(x+2,y+1,tw-4,2,'#5a8a5a');
  // Windscreen
  px(x+3,y+2,tw-6,8,'#88aaff');px(x+4,y+3,tw-8,3,'#aaccff');
  // Headlights
  px(x+2,y,3,3,'#ffff88');px(x+tw-5,y,3,3,'#ffff88');
  // Wheels (3 pairs)
  [[5],[22]].forEach(([wy])=>{
    px(x-2,y+wy,4,8,'#111');px(x+tw-2,y+wy,4,8,'#111');
  });
  px(x-2,y+th-12,4,8,'#111');px(x+tw-2,y+th-12,4,8,'#111');
  // Cargo stripes
  for(let i=0;i<3;i++)px(x+2+i*5,y+18,1,th-20,'#3a6a3a');
}

function drawCamion(x,y){
  const cw=20,ch=56;
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(x+2,y+ch,cw-2,3);
  // Trailer
  px(x,y+16,cw,ch-16,'#7a4422');
  px(x+1,y+17,cw-2,2,'#9a6644');
  // Cabin
  px(x+1,y,cw-2,18,'#6a3311');
  px(x+2,y+1,cw-4,2,'#8a5533');
  // Windscreen
  px(x+3,y+2,cw-6,9,'#99bbff');px(x+4,y+3,cw-8,4,'#bbddff');
  // Headlights
  px(x+2,y,3,3,'#ffff88');px(x+cw-5,y,3,3,'#ffff88');
  // Wheel sets (3 axles)
  [6,20,ch-14].forEach(wy=>{
    px(x-3,y+wy,4,9,'#111');px(x-2,y+wy+1,2,7,'#333');
    px(x+cw-1,y+wy,4,9,'#111');px(x+cw,y+wy+1,2,7,'#333');
  });
  // Trailer details
  px(x+cw-3,y+18,2,ch-20,'#5a3311');
  for(let i=0;i<3;i++)px(x+3+i*6,y+22,1,ch-24,'#5a3311');
}

function drawPolice(x,y){
  drawCar(x,y,'#2244bb',14,22);
  // Police text
  ctx.fillStyle='#fff';ctx.font='bold 4px monospace';ctx.textAlign='center';
  ctx.fillText('POLICIA',x+7,y+15);
  // Light bar
  px(x+3,y-3,8,3,'#222');
  // Flashing lights (alternate red/blue based on frame)
  const fl=(Date.now()>>8)&1;
  px(x+3,y-3,4,3,fl?'#ff1111':'#cc0000');
  px(x+7,y-3,4,3,fl?'#0044ff':'#0022cc');
}

function drawPedestrian(x,y){
  const hue=Math.floor(rnd(0,360));
  px(x+3,y,   4,4,'#ffcc88'); // head
  px(x+2,y+4, 6,7,`hsl(${hue},55%,42%)`); // body
  px(x+2,y+4, 6,2,`hsl(${hue},65%,55%)`); // shoulder highlight
  px(x+1,y+11,3,5,'#445566'); // legs
  px(x+6,y+11,3,5,'#445566');
  // Walking animation hint
  px(x+1,y+5, 2,5,`hsl(${hue+30},50%,40%)`); // arm L
  px(x+7,y+5, 2,5,`hsl(${hue+30},50%,40%)`); // arm R
}

function drawGasStation(x,y,brand){
  // Station structure
  px(x,y+12,18,18,'#e0e0e0');
  px(x+1,y+13,16,2,'#cccccc');
  // Canopy
  px(x-2,y+6,22,8,brand==='YPF'?'#005cbf':'#dd5500');
  px(x-1,y+7,20,2,brand==='YPF'?'#0077ff':'#ff7722');
  // Brand text
  ctx.fillStyle='#fff';ctx.font='bold 7px monospace';ctx.textAlign='center';
  ctx.fillText(brand,x+9,y+13);
  // Pump
  px(x+5,y+14,8,14,'#ccc');px(x+6,y+15,6,4,'#999');
  px(x+7,y+19,4,7,'#888');
  // Hose
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+12,y+22);ctx.bezierCurveTo(x+16,y+22,x+16,y+28,x+14,y+28);ctx.stroke();
  // Glow indicator
  ctx.fillStyle='#00ff88';ctx.font='8px monospace';ctx.fillText('⛽',x+9,y+10);
}

function drawTrafficLight(x,y,state){
  // Post
  px(x+3,y+22,2,20,'#888');
  // Housing
  px(x,y,8,22,'#1a1a1a');px(x+1,y+1,6,20,'#222');
  // Lights
  px(x+1,y+1, 6,6,state===0?'#ff2200':'#220000');
  if(state===0){ctx.fillStyle='rgba(255,80,0,.3)';ctx.fillRect(x-1,y-1,10,8);}
  px(x+1,y+8, 6,6,state===1?'#ffcc00':'#222200');
  if(state===1){ctx.fillStyle='rgba(255,200,0,.2)';ctx.fillRect(x-1,y+7,10,8);}
  px(x+1,y+15,6,6,state===2?'#00dd44':'#002200');
  if(state===2){ctx.fillStyle='rgba(0,200,80,.2)';ctx.fillRect(x-1,y+14,10,8);}
}

function drawPothole(x,y,big){
  const rw=big?13:8,rh=big?8:5;
  ctx.save();
  // Outer crack shadow
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(x,y,rw+2,rh+2,0,0,Math.PI*2);ctx.fill();
  // Hole
  ctx.fillStyle='#050505';ctx.beginPath();ctx.ellipse(x,y,rw,rh,0,0,Math.PI*2);ctx.fill();
  // Cracks
  ctx.strokeStyle='#1c1c1c';ctx.lineWidth=1;
  [[-rw*.6,-rh*.3,rw*.4,rh*.4],[rw*.4,-rh*.5,-rw*.3,rh*.3]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x+x1,y+y1);ctx.lineTo(x+x2,y+y2);ctx.stroke();
  });
  // Rim highlight
  ctx.strokeStyle='#2e2e2e';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(x-1,y-1,rw,rh,-.2,3.4,5.8);ctx.stroke();
  ctx.restore();
}

function drawMudPuddle(x,y){
  ctx.save();
  ctx.fillStyle='rgba(50,32,10,.8)';ctx.beginPath();ctx.ellipse(x,y,15,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(80,55,20,.4)';ctx.beginPath();ctx.ellipse(x-3,y-2,7,4,.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawExplosion(x,y,t){
  const r=(60-t)*1.7;
  ctx.globalAlpha=Math.max(0,t/60);ctx.shadowColor='#ff6600';ctx.shadowBlur=24;
  ['#ff2200','#ff6600','#ffcc00','#ffffff'].forEach((c,i)=>{
    ctx.strokeStyle=c;ctx.lineWidth=3-i*.5;
    ctx.beginPath();ctx.arc(x,y,Math.max(0,r-i*4.5),0,Math.PI*2);ctx.stroke();
  });
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2+(60-t)*.12,pr=r*.9;
    const sz=4-Math.floor(i/5);
    px(x+Math.cos(a)*pr-sz/2,y+Math.sin(a)*pr-sz/2,sz,sz,['#ff2200','#ff6600','#ffcc00','#fff'][i%4]);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// PLAYER CAR
// ═══════════════════════════════════════════════════════════
class Player {
  constructor(){this.reset();}
  reset(){
    this.x=CW/2;this.y=CH-80;this.w=16;this.h=28;
    this.vx=0;this.speed=0;this.maxSpd=130;
    this.alive=true;this.skidding=false;this.skidT=0;this.skidDir=0;
    this.exploding=false;this.explT=0;this.inv=0;this.fuel=100;
  }
  update(cfg){
    if(!this.alive)return;
    if(this.inv>0)this.inv--;
    if(cfg.mud&&Math.random()<.0015&&!this.skidding)this.startSkid(Math.random()<.5?-1:1);
    this.fuel-=cfg.fuelDrain;
    if(this.fuel<=0){this.fuel=0;this.explode();return;}
    this.speed=Math.min(this.speed+.7,this.maxSpd);
    if(this.skidding){
      this.x+=this.skidDir*(cfg.mud?2.4:2.0);this.skidT--;
      if(this.skidT<=0)this.skidding=false;
    } else {
      const accel=cfg.mud?.8:1.05;
      if(KEYS['ArrowLeft']||KEYS['left'])   this.vx=Math.max(this.vx-accel,-4.2);
      else if(KEYS['ArrowRight']||KEYS['right'])this.vx=Math.min(this.vx+accel, 4.2);
      else this.vx*=cfg.mud?.76:.82;
      this.x+=this.vx;
    }
    if(this.x<RL+this.w/2){this.x=RL+this.w/2;if(Math.abs(this.vx)>1.2)this.startSkid(-1);this.vx=0;}
    if(this.x>RR-this.w/2){this.x=RR-this.w/2;if(Math.abs(this.vx)>1.2)this.startSkid(1);this.vx=0;}
    setEngineSpeed(this.speed/this.maxSpd);
  }
  startSkid(dir){
    if(this.inv>0)return;
    this.skidding=true;this.skidT=30;this.skidDir=dir;this.inv=50;sndSkid();
  }
  explode(){if(this.exploding)return;this.exploding=true;this.explT=65;this.alive=false;sndCrash();}
  draw(){
    if(this.exploding){drawExplosion(this.x,this.y,this.explT);this.explT--;return;}
    if(!this.alive)return;
    if(this.inv>0&&Math.floor(this.inv/5)%2===0)return;
    // Center the 20×32 sprite on (this.x, this.y)
    const X=Math.round(this.x-10), Y=Math.round(this.y-16);

    // ── GROUND SHADOW ──
    ctx.fillStyle='rgba(0,0,0,.28)';
    ctx.beginPath();ctx.ellipse(this.x,this.y+17,9,3,0,0,Math.PI*2);ctx.fill();

    // ── FRONT WING (wide, flat, pink) ──
    px(X-4, Y+1,  28, 3, '#ff1493');   // main plane
    px(X-4, Y+1,  28, 1, '#ff69b4');   // highlight
    px(X-4, Y+3,  4,  2, '#cc0066');   // end plate L
    px(X+20,Y+3,  4,  2, '#cc0066');   // end plate R

    // ── NOSE ──
    px(X+4,  Y+3,  12, 4, '#ff1493');
    px(X+5,  Y+3,  10, 1, '#ff69b4');  // nose highlight

    // ── BODY MAIN (wide F1 pontoons) ──
    px(X+1,  Y+6,  18, 16, '#ff1493'); // main body
    px(X+2,  Y+6,  16, 2,  '#ff69b4'); // top highlight
    // Side pontoons
    px(X-1,  Y+7,  4,  12, '#dd0077'); // L pod
    px(X+17, Y+7,  4,  12, '#dd0077'); // R pod
    // Pod highlights
    px(X-1,  Y+7,  4,  1,  '#ff44aa');
    px(X+17, Y+7,  4,  1,  '#ff44aa');
    // White stripe down center
    px(X+8,  Y+6,  4,  16, '#ffffff');
    px(X+9,  Y+6,  2,  16, '#ff69b4'); // stripe tint

    // ── COCKPIT SURROUND ──
    px(X+4,  Y+6,  12, 6,  '#ff1493');
    px(X+5,  Y+6,  10, 1,  '#ff88bb');

    // ── HELMET (white circle with pink paw) ──
    // Helmet base
    px(X+5,  Y+4,  10, 9,  '#ffffff');
    px(X+6,  Y+3,  8,  1,  '#eeeeee');
    px(X+5,  Y+12, 10, 1,  '#dddddd');
    // Visor (dark)
    px(X+6,  Y+7,  8,  4,  '#222233');
    px(X+7,  Y+7,  6,  1,  '#3a3a55'); // visor glare
    // Pink paw print on helmet
    ctx.fillStyle='#ff1493';
    ctx.beginPath();ctx.ellipse(X+10,Y+5,2.5,2.5,0,0,Math.PI*2);ctx.fill(); // main pad
    ctx.beginPath();ctx.ellipse(X+8, Y+4,1,1,0,0,Math.PI*2);ctx.fill();     // toe 1
    ctx.beginPath();ctx.ellipse(X+10,Y+3,1,1,0,0,Math.PI*2);ctx.fill();     // toe 2
    ctx.beginPath();ctx.ellipse(X+12,Y+4,1,1,0,0,Math.PI*2);ctx.fill();     // toe 3

    // ── RACE NUMBER 31 ──
    ctx.save();
    ctx.fillStyle='#ffdd00';
    ctx.font='bold 6px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('31', X+10, Y+17);
    ctx.restore();

    // ── REAR WING (wide, tall) ──
    px(X-3,  Y+21, 26, 2,  '#ff1493'); // main plane
    px(X-3,  Y+21, 26, 1,  '#ff69b4'); // wing highlight
    px(X-3,  Y+22, 3,  4,  '#cc0066'); // end plate L
    px(X+20, Y+22, 3,  4,  '#cc0066'); // end plate R
    // Wing pillars
    px(X+4,  Y+22, 3,  4,  '#dd0077');
    px(X+13, Y+22, 3,  4,  '#dd0077');

    // ── REAR DIFFUSER ──
    px(X+3,  Y+25, 14, 4,  '#990044');
    px(X+4,  Y+26, 12, 1,  '#aa0055');
    // Diffuser fins
    [5,8,11,14].forEach(ox=>px(X+ox,Y+25,1,4,'#770033'));

    // ── WHEELS (fat, dark, rounded feel) ──
    // Front wheels
    px(X-5,  Y+4,  5,  9,  '#1a1a1a'); px(X-4, Y+5,  3,7,'#2e2e2e');
    px(X+20, Y+4,  5,  9,  '#1a1a1a'); px(X+21,Y+5,  3,7,'#2e2e2e');
    // Rear wheels
    px(X-5,  Y+17, 5,  9,  '#1a1a1a'); px(X-4, Y+18, 3,7,'#2e2e2e');
    px(X+20, Y+17, 5,  9,  '#1a1a1a'); px(X+21,Y+18, 3,7,'#2e2e2e');
    // Wheel rims (pink accent)
    px(X-4,  Y+6,  2,  5,  '#ff69b4');
    px(X+21, Y+6,  2,  5,  '#ff69b4');
    px(X-4,  Y+19, 2,  5,  '#ff69b4');
    px(X+21, Y+19, 2,  5,  '#ff69b4');

    // ── EXHAUST GLOW ──
    ctx.save();
    ctx.shadowColor='#ff44aa';ctx.shadowBlur=6;
    px(X+6,  Y+28, 2,2,'#ff44aa');
    px(X+12, Y+28, 2,2,'#ff44aa');
    ctx.shadowBlur=0;ctx.restore();

    // ── SKID MARKS ──
    if(this.skidding){
      ctx.fillStyle='rgba(110,85,60,.55)';
      ctx.fillRect(X+4, Y+26,3,12);
      ctx.fillRect(X+13,Y+26,3,12);
    }
  }
  getRect(){return{x:this.x-7,y:this.y-13,w:14,h:26};}
}

// ═══════════════════════════════════════════════════════════
// VEHICLE (traffic)
// ═══════════════════════════════════════════════════════════
class Vehicle {
  constructor(type,lane,cfg){
    this.type=type;this.lane=lane;this.x=LANES[lane];
    this.ci=Math.floor(Math.random()*CAR_COLORS.length);
    const spd=cfg.speed;
    this.speed=spd*(type==='bus'?.28:type==='camion'?.22:type==='truck'?.32:.48+rnd(0,.45));
    this.clT=rnd(60,150);this.tX=this.x;
    this.lineNum=BUS_LINES[~~rnd(0,BUS_LINES.length)];
    this.givesFuel=['car'].includes(type)&&Math.random()<.25;
    switch(type){
      case 'bus':      this.w=22;this.h=50;break;
      case 'camion':   this.w=20;this.h=56;break;
      case 'truck':    this.w=18;this.h=38;break;
      case 'moto':     this.w=12;this.h=18;break;
      case 'bike':     this.w=12;this.h=17;break;
      case 'pedestrian':this.w=8;this.h=17;break;
      default:         this.w=14;this.h=22;
    }
    this.y=-this.h-rnd(10,50);
  }
  update(ps){
    this.y+=(ps*.038)-this.speed*.48;
    this.clT--;
    if(this.clT<=0&&Math.random()<.25){
      this.lane=~~rnd(0,LC);this.tX=LANES[this.lane];this.clT=rnd(70,150);
    }
    this.x+=(this.tX-this.x)*.055;
  }
  draw(){
    const x=Math.round(this.x-this.w/2),y=Math.round(this.y-this.h/2);
    switch(this.type){
      case 'car':       drawCar(x,y,this.givesFuel?CAR_COLORS[this.ci]:CAR_COLORS[this.ci],this.w,this.h);break;
      case 'taxi':      drawTaxi(x,y);break;
      case 'moto':      drawMoto(x,y);break;
      case 'bike':      drawBike(x,y);break;
      case 'bus':       drawBus(x,y,this.lineNum);break;
      case 'truck':     drawTruck(x,y);break;
      case 'camion':    drawCamion(x,y);break;
      case 'police':    drawPolice(x,y);break;
      case 'pedestrian':drawPedestrian(x,y);break;
    }
    if(this.givesFuel){
      // Pulsing glow
      const a=.5+.5*Math.sin(Date.now()*.006);
      ctx.save();ctx.shadowColor='#00ff88';ctx.shadowBlur=6*a;
      ctx.fillStyle=`rgba(0,255,136,${.7*a})`;ctx.font='7px monospace';ctx.textAlign='center';
      ctx.fillText('⛽',this.x,y-2);ctx.restore();
    }
  }
  getRect(){return{x:this.x-this.w/2+1,y:this.y-this.h/2+1,w:this.w-2,h:this.h-2};}
  off(){return this.y>CH+90;}
}

// OBSTACLE
// ═══════════════════════════════════════════════════════════
class Obstacle{
  constructor(type){
    this.type=type;
    this.x=LANES[~~rnd(0,LC)]+rnd(-16,16);this.y=-20;
    this.big=Math.random()<.3;
  }
  update(ps){this.y+=ps*.038;}
  draw(){this.type==='pothole'?drawPothole(this.x,this.y,this.big):drawMudPuddle(this.x,this.y);}
  getRect(){const s=this.big?11:7;return{x:this.x-s,y:this.y-s*.6,w:s*2,h:s*1.2};}
  off(){return this.y>CH+30;}
}

// ═══════════════════════════════════════════════════════════
// GAS STATION
// ═══════════════════════════════════════════════════════════
class GasStation{
  constructor(){
    this.side=Math.random()<.5?'L':'R';
    this.x=this.side==='L'?15:CW-15;this.y=-50;
    this.brand=Math.random()<.5?'YPF':'SHELL';
    this.used=false;this.w=22;this.h=32;this.glow=0;
  }
  update(ps){this.y+=ps*.038;if(this.glow>0)this.glow--;}
  draw(){
    drawGasStation(Math.round(this.x-9),Math.round(this.y-16),this.brand);
    if(this.glow>0){
      ctx.save();ctx.strokeStyle=`rgba(0,255,136,${this.glow/30})`;
      ctx.lineWidth=2;ctx.strokeRect(this.x-11,this.y-18,24,36);ctx.restore();
    }
  }
  getRect(){return{x:this.x-9,y:this.y-16,w:18,h:32};}
  off(){return this.y>CH+70;}
}

// ═══════════════════════════════════════════════════════════
class TrafficLight{
  constructor(){
    this.x=LANES[~~rnd(0,LC)];this.y=-50;
    this.state=2;this.stT=rnd(180,300);this.w=8;this.h=22;
  }
  update(ps){
    this.y+=ps*.038;this.stT--;
    if(this.stT<=0){this.state=(this.state+1)%3;this.stT=this.state===1?35:rnd(140,260);}
  }
  draw(){drawTrafficLight(Math.round(this.x-4),Math.round(this.y-11),this.state);}
  getRect(){return{x:this.x-4,y:this.y-11,w:8,h:22};}
  off(){return this.y>CH+60;}
}

// ═══════════════════════════════════════════════════════════
// ROAD
// ═══════════════════════════════════════════════════════════
class Road{
  constructor(cfg){
    this.cfg=cfg;this.offset=0;this.cO=0;this.cT2=0;this.cS=0;
    this.sc=[];this.rd=[];
    for(let i=0;i<24;i++)this.sc.push(this._ns(rnd(0,CH)));
    if(cfg.rain)for(let i=0;i<70;i++)this.rd.push({x:rnd(0,CW),y:rnd(0,CH),l:rnd(4,9)});
  }
  _ns(y){
    const s=Math.random()<.5?'L':'R';
    const x=s==='L'?rnd(2,RL-5):rnd(RR+5,CW-4);
    return{x,y,type:~~rnd(0,6),c:['#1e4a1e','#2a6a2a','#0e380e','#8a5a00','#446644','#557755'][~~rnd(0,6)]};
  }
  update(ps){
    this.offset=(this.offset+ps*.28)%40;
    if(Math.random()<this.cfg.curveFreq){this.cT2=(Math.random()-.5)*50;this.cS=.025;}
    this.cO+=(this.cT2-this.cO)*this.cS;
    this.sc.forEach(s=>{s.y+=ps*.1;if(s.y>CH+20)Object.assign(s,this._ns(-20));});
    if(this.cfg.rain)this.rd.forEach(r=>{r.y+=5+ps*.035;r.x-=.4;if(r.y>CH){r.y=-6;r.x=rnd(0,CW);}});
  }
  draw(){
    const cfg=this.cfg;
    // Sky/background
    if(cfg.dark){
      // Night gradient
      const gd=ctx.createLinearGradient(0,0,0,CH);
      gd.addColorStop(0,'#050510');gd.addColorStop(1,'#0a0a18');
      ctx.fillStyle=gd;ctx.fillRect(0,0,CW,CH);
      // Stars
      ctx.fillStyle='rgba(255,255,255,.6)';
      for(let i=0;i<30;i++){const sx=(i*73)%CW,sy=(i*47)%100;ctx.fillRect(sx,sy,1,1);}
      // Headlight cone
      const hg=ctx.createRadialGradient(CW/2,CH-75,8,CW/2,CH-130,160);
      hg.addColorStop(0,'rgba(255,248,200,.22)');hg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=hg;ctx.fillRect(0,0,CW,CH);
    } else if(cfg.rain){
      ctx.fillStyle='#0e1218';ctx.fillRect(0,0,CW,CH);
    } else {
      ctx.fillStyle='#111118';ctx.fillRect(0,0,CW,CH);
    }
    // Sidewalks
    ctx.fillStyle=cfg.sideTint;ctx.fillRect(0,0,RL,CH);ctx.fillRect(RR,0,CW-RR,CH);
    // Sidewalk edge lines
    ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(RL-1,0,1,CH);ctx.fillRect(RR,0,1,CH);
    // Road surface
    ctx.fillStyle=cfg.bgRoad;ctx.fillRect(RL,0,RW,CH);
    // Road gradient (darker at edges)
    const rgL=ctx.createLinearGradient(RL,0,RL+12,0);
    rgL.addColorStop(0,'rgba(0,0,0,.2)');rgL.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rgL;ctx.fillRect(RL,0,12,CH);
    const rgR=ctx.createLinearGradient(RR-12,0,RR,0);
    rgR.addColorStop(0,'rgba(0,0,0,0)');rgR.addColorStop(1,'rgba(0,0,0,.2)');
    ctx.fillStyle=rgR;ctx.fillRect(RR-12,0,12,CH);
    // Dirt patches
    if(cfg.dirt){
      ctx.fillStyle='rgba(90,65,25,.12)';
      [[RL+5,80,35,8],[RL+55,200,25,6],[RL+30,350,40,7],[RL+60,420,20,5]].forEach(([rx,ry,rw,rh2])=>{
        ctx.fillRect(rx,ry,rw,rh2);
      });
    }
    // Lane dashes
    const dashCol=cfg.dark?'#44445a':cfg.rain?'#3a3a48':'#4a4a5a';
    ctx.fillStyle=dashCol;
    for(let y=-40+this.offset;y<CH+40;y+=40){
      ctx.fillRect(RL+LW-1,y,2,24);ctx.fillRect(RL+LW*2-1,y,2,24);
    }
    // Road edge lines (white, subtle)
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.fillRect(RL+2,0,2,CH);ctx.fillRect(RR-4,0,2,CH);
    // Scenery
    this.sc.forEach(s=>this._ds(s));
    // Rain
    if(cfg.rain){
      ctx.save();ctx.strokeStyle='rgba(140,175,255,.55)';ctx.lineWidth=1;
      this.rd.forEach(r=>{ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-.8,r.y+r.l);ctx.stroke();});
      ctx.restore();
      ctx.fillStyle='rgba(8,14,30,.15)';ctx.fillRect(0,0,CW,CH);
    }
    // Kerb stripes (red/white at road edges)
    for(let y=0;y<CH;y+=14){
      const kc=(~~(y/7))%2===0?'#cc0000':'#ffffff';
      px(RL,y,3,7,kc);px(RR-3,y,3,7,kc);
    }
  }
  _ds(s){
    const x=~~s.x,y=~~s.y;
    switch(s.type){
      case 0: // Tree
        px(x-1,y,3,8,'#2a3a1a');px(x-4,y-8,10,8,s.c);px(x-2,y-14,6,7,s.c);px(x-1,y-18,4,5,lt(s.c));
        break;
      case 1: // Building
        px(x-5,y-14,12,18,'#334466');px(x-4,y-13,10,2,'#445577');
        px(x-3,y-11,3,3,'#ffee44');px(x+2,y-11,3,3,'#aaddff');
        px(x-3,y-6, 3,3,'#aaddff');px(x+2,y-6, 3,3,'#ffee44');
        px(x-3,y-1, 3,3,'#ffee44');px(x+2,y-1, 3,3,'#ffee44');
        break;
      case 2: // Bush
        px(x-3,y-2,8,5,'#1e3e1e');px(x-5,y-5,12,7,s.c);px(x-2,y-8,6,4,lt(s.c));
        break;
      case 3: // KM sign
        px(x,y-10,2,12,'#666');px(x-4,y-14,10,6,'#bb3300');
        ctx.fillStyle='#fff';ctx.font='4px monospace';ctx.textAlign='center';ctx.fillText('KM',x+1,y-10);
        break;
      case 4: // Lamp post
        px(x,y-16,2,20,'#777');px(x-4,y-18,10,3,'#666');
        ctx.save();ctx.shadowColor='#ffee88';ctx.shadowBlur=8;px(x-3,y-18,8,2,'#ffee88');ctx.restore();
        break;
      case 5: // Tall tree
        px(x-1,y,3,10,'#2a3a1a');px(x-5,y-10,12,10,s.c);px(x-3,y-18,8,10,s.c);px(x-1,y-24,4,7,lt(s.c));
        break;
    }
  }
}

}

// ── CIRCUIT SELECT ──
function buildCircuitSelect(){
  const grid=document.getElementById('cs-grid');grid.innerHTML='';
  LEVEL_CFG.forEach((cfg,i)=>{
    const idx=i+1;
    const isConquered=conquered.has(idx);
    // Unlocked if idx===1 OR any previous level conquered, OR level 1 always unlocked
    const unlocked=idx===1||conquered.size>=idx-1||conquered.has(idx-1);
    const card=document.createElement('div');
    card.className='cs-card'+(isConquered?' done':'')+(unlocked?'':' locked');
    card.innerHTML=`
      <div class="cs-num" style="color:${cfg.color}">${cfg.emoji}</div>
      <div class="cs-info">
        <div class="cs-name">${cfg.name}</div>
        <div class="cs-diff"><span class="cs-stars">${cfg.diff}</span></div>
      </div>
      <div class="cs-trophy">${isConquered?'🏆':unlocked?'▶':'🔒'}</div>
      <div class="cs-bar" style="width:${isConquered?100:0}%"></div>
    `;
    if(unlocked){
      card.addEventListener('click',()=>startLevel(idx));
      card.addEventListener('touchend',e=>{e.preventDefault();startLevel(idx);},{passive:false});
    }
    grid.appendChild(card);
  });
}

// ── COLLISIONS ──
function checkCollisions(){
  if(!player.alive||player.inv>0)return;
  const pr=player.getRect();

  for(const v of vehicles){
    const vr=v.getRect();if(!rects(pr,vr))continue;
    const ox=Math.min(pr.x+pr.w,vr.x+vr.w)-Math.max(pr.x,vr.x);
    const oy=Math.min(pr.y+pr.h,vr.y+vr.h)-Math.max(pr.y,vr.y);
    if(ox<5||oy<3){player.startSkid(player.x<v.x?-1:1);continue;}
    if(v.givesFuel){player.fuel=Math.min(100,player.fuel+15);score+=300;sndFuel();v.givesFuel=false;continue;}
    player.explode();lives--;updateLivesUI();
    if(lives<=0)setTimeout(showGameOver,900);
    return;
  }
  obstacles=obstacles.filter(o=>{
    if(!rects(pr,o.getRect()))return true;
    if(!player.skidding){player.startSkid(player.vx>=0?1:-1);sndBump();}
    return false;
  });
  stations.forEach(s=>{
    if(s.used||!rects(pr,s.getRect()))return;
    if(!usedStationThisLevel){
      player.fuel=Math.min(100,player.fuel+50);score+=1000;s.used=true;s.glow=35;
      usedStationThisLevel=true;sndFuel();showBadge('<div style="color:#00ff88;font-size:clamp(14px,3.5vw,20px)">⛽ +50% NAFTA</div>');
    }
  });
  lights.forEach(tl=>{
    if(!rects(pr,tl.getRect()))return;
    if(tl.state===0&&!player.skidding){
      player.fuel=Math.max(0,player.fuel-12);score=Math.max(0,score-500);
      player.startSkid(Math.random()<.5?-1:1);
      showBadge('<div style="color:#ff3300;font-size:clamp(12px,3vw,18px)">🚦 ROJO −12% NAFTA</div>');
    }
  });
}

  document.getElementById('ui-spd').textContent=~~(player.speed*1.4);
  document.getElementById('ui-score').textContent=score.toLocaleString();
  const fp=Math.max(0,player.fuel);
  document.getElementById('ui-fuel').textContent=~~fp+'%';
  document.getElementById('fuel-fill').style.width=fp+'%';
  document.getElementById('fuel-fill').style.background=fp>55?'linear-gradient(90deg,#00aa33,#00ff77)':fp>25?'linear-gradient(90deg,#cc7700,#ffbb00)':'linear-gradient(90deg,#cc0000,#ff4400)';
  const pg=Math.min(100,(distance/targetDist)*100);
  document.getElementById('ui-prog').textContent=~~pg+'%';
  document.getElementById('prog-fill').style.width=pg+'%';
  document.getElementById('prog-fill').style.background=`linear-gradient(90deg,#0088ff,#00ff88 ${pg}%,#ffdd00)`;
}

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
function loop(){
  rafId=requestAnimationFrame(loop);
  if(gameState!=='playing')return;
  const cfg=LEVEL_CFG[level-1];

  road.update(player.speed);
  player.update(cfg);

  if(player.exploding&&player.explT<=0){
    player.exploding=false;
    if(lives<=0)return;
    if(player.fuel<=0){showGameOver();return;}
    player.alive=true;player.x=CW/2;player.y=CH-80;player.vx=0;player.skidding=false;player.inv=140;
  }

  spawnT--;if(spawnT<=0){spawnVehicle();const iv=Math.max(42,105-level*8);spawnT=iv+rnd(0,iv*.4);}
  fuelT--;if(fuelT<=0){const fv=new Vehicle('car',~~rnd(0,LC),cfg);fv.givesFuel=true;vehicles.push(fv);fuelT=rnd(210,340);}
  obsT--;if(obsT<=0){obstacles.push(new Obstacle(cfg.mud&&Math.random()<.45?'mud':'pothole'));obsT=rnd(95,165);}
  stationT--;if(stationT<=0&&!usedStationThisLevel){stations.push(new GasStation());stationT=rnd(420,700);}
  if(cfg.hasTrafficLight){lightT--;if(lightT<=0){lights.push(new TrafficLight());lightT=rnd(260,420);}}

  vehicles.forEach(v=>v.update(player.speed));
  obstacles.forEach(o=>o.update(player.speed));
  stations.forEach(s=>s.update(player.speed));
  lights.forEach(tl=>tl.update(player.speed));

  vehicles=vehicles.filter(v=>!v.off());
  obstacles=obstacles.filter(o=>!o.off());
  stations=stations.filter(s=>!s.off());
  lights=lights.filter(tl=>!tl.off());

  if(player.alive){distance+=player.speed*.009;score+=~~(player.speed*.006);}

  checkCollisions();

  if(player.alive&&!levelDone&&distance>=targetDist){
    levelDone=true;score+=5000+~~(player.fuel*130);
    if(level>=5)showWin();else showLevelOK();
    return;
  }

  // ── DRAW ──
  road.draw();
  obstacles.forEach(o=>o.draw());
  stations.forEach(s=>s.draw());
  lights.forEach(tl=>tl.draw());
  vehicles.forEach(v=>v.draw());
  player.draw();

  // Subtle vignette
  const vig=ctx.createRadialGradient(CW/2,CH/2,CH*.3,CW/2,CH/2,CH*.72);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.28)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,CW,CH);

  // Scanlines (subtle)
  ctx.fillStyle='rgba(0,0,0,.04)';
  for(let y=0;y<CH;y+=2)ctx.fillRect(0,y,CW,1);

  updateHUD();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  resize();
  // Preview
  ctx.fillStyle='#111118';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#2c2c3a';ctx.fillRect(RL,0,RW,CH);
  ctx.fillStyle='#ff0066';ctx.fillRect(RL,0,3,CH);ctx.fillRect(RR-3,0,3,CH);
  showStart();
});
</script>
