<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Pacientes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 35px;
      width: 420px;
      border-radius: 14px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #0d47a1;
      font-weight: 700;
    }

    label {
      font-weight: bold;
      color: #333;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #b0bec5;
      border-radius: 6px;
      font-size: 15px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #1976d2;
      box-shadow: 0 0 5px rgba(25,118,210,0.4);
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1976d2;
      border: none;
      color: white;
      font-size: 17px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    button:hover {
      background: #0d47a1;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Registro de Pacientes</h2>

    <form action="http://localhost:5678/webhook-test/auth/register" method="POST">

      <label>Nombre</label>
      <input name="nombre" required>

      <label>Apellido</label>
      <input name="apellido" required>

      <label>DNI</label>
      <input name="dni" required>

      <label>Email</label>
      <input name="email" type="email" required>

      <label>Cobertura</label>
      <input name="cobertura" required>

      <label>Nro Afiliado</label>
      <input name="nro_afiliado" required>

      <label>Password (4 dígitos)</label>
      <input name="password" type="password" minlength="4" maxlength="4" required>

      <label>Confirmar Password</label>
      <input name="password_confirm" type="password" minlength="4" maxlength="4" required>

      <button type="submit">Crear Cuenta</button>
    </form>
  </div>

</body>
</html>
