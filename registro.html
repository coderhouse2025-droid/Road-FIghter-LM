<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Pacientes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      width: 380px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    label {
      font-weight: bold;
      color: #444;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Registro de Pacientes</h2>

    <form id="registroForm">

      <label>Nombre</label>
      <input name="nombre" required>

      <label>Apellido</label>
      <input name="apellido" required>

      <label>DNI</label>
      <input name="dni" required>

      <label>Email</label>
      <input name="email" type="email" required>

      <label>Cobertura</label>
      <input name="cobertura" required>

      <label>Nro Afiliado</label>
      <input name="nro_afiliado" required>

      <label>Password (4 dígitos)</label>
      <input name="password" type="password" minlength="4" maxlength="4" required>

      <label>Confirmar Password</label>
      <input name="password_confirm" type="password" minlength="4" maxlength="4" required>

      <button type="submit">Crear Cuenta</button>
    </form>
  </div>

  <script>
    document.getElementById("registroForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const form = e.target;
      const data = new FormData(form);

      try {
        const response = await fetch("http://localhost:5678/webhook-test/auth/register", {
          method: "POST",
          body: data
        });

        const text = await response.text();
        alert("Respuesta del servidor: " + text);
      } catch (err) {
        alert("Error al enviar: " + err.message);
      }
    });
  </script>

</body>
</html>
